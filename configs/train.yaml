# P1 (LoRA-SFT) and P2 (DPO/ORPO) configuration.
# NOTE: P0 must be green before any training. test/hard_test NEVER appear here.

data:
  sft_train: data/sft_train.jsonl
  sft_val:   data/sft_val.jsonl
  preference_pairs: data/preference_pairs.jsonl

p1_lora_sft:
  base_model: Qwen/Qwen2.5-VL-3B-Instruct
  output_dir: ./checkpoints/qwen3b-lora-sft
  lora_rank: 16              # try 32 if underfitting
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: all-linear
  num_train_epochs: 2        # 1-3
  learning_rate: 1.0e-4      # try 2e-4
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  max_length: 2048
  freeze_vit: true           # tune the LLM + projector first
  # checkpoint selection: by val macro-F1 / val accuracy, NOT loss alone.
  eval_strategy: steps
  eval_steps: 50
  save_strategy: steps
  save_steps: 50
  metric_for_best_model: val_macro_f1

p2_dpo_orpo:
  method: dpo               # or "orpo"
  base_model: Qwen/Qwen2.5-VL-3B-Instruct
  adapter: ./checkpoints/qwen3b-lora-sft   # start from the SFT model
  output_dir: ./checkpoints/qwen3b-sft-dpo
  beta: 0.1                 # DPO temperature
  learning_rate: 5.0e-6
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  max_length: 2048
